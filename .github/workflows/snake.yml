name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # allows manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=F0A500&color_dots[0]=ebedf0&color_dots[1]=9be9a8&color_dots[2]=40c463&color_dots[3]=30a14e&color_dots[4]=2ECC71
            dist/github-snake-dark.svg?color_snake=F0A500&color_dots[0]=0A0E14&color_dots[1]=112B2B&color_dots[2]=1A5C34&color_dots[3]=27AE60&color_dots[4]=2ECC71

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
